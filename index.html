<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Seating Arrangement</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="icon.png" type="image/gif" >
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">
    <header>
        <h1>Exam Seating Arrangement</h1>
        <p class="subtitle">Smart & Automatic Seating System</p>
    </header>

    <main class="main-content">

        <!-- LEFT PANEL -->
        <section class="control-panel">

            <div class="card">
                <h2>Add Student</h2>

                <div class="form-group">
                    <label>Rows</label>
                    <input type="number" id="rows" value="2" min="1">
                </div>

                <div class="form-group">
                    <label>Columns</label>
                    <input type="number" id="cols" value="4" min="1">
                </div>

                <form id="student-form">
                    <input type="text" id="roll-number" placeholder="Roll Number" required>

                    <select id="subject" required>
                        <option value="">Select Subject</option>
                        <option value="math">Math</option>
                        <option value="physics">Physics</option>
                        <option value="chemistry">Chemistry</option>
                    </select>

                    <button type="submit" class="btn primary-btn">Add Student</button>
                </form>

                <!-- CSV Upload -->
                <h4>Upload CSV</h4>
                <input type="file" id="file-input" accept=".csv, .xlsx, .xls">

                <div id="status-msg" class="status-message"></div>
            </div>

            <div class="card">
                <h2>Students (<span id="student-count">0</span>)</h2>

                <ul id="students-list"></ul>

                <button id="generate-btn" class="btn secondary-btn">Generate Seating</button>
                <button id="reset-btn" class="btn outline-btn">Reset</button>
            </div>

        </section>

        <!-- RIGHT PANEL -->
        <section class="seating-panel">
            <div class="card">
                <h2>Seating Layout</h2>

                <div id="seating-grid" class="seating-grid"></div>
            </div>
        </section>

    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="script.js"></script>
</body>
</html>
